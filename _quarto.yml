project:
  type: default
  output-dir: docs
  render:
    - src/notebooks/eda.ipynb
    - src/notebooks/modeling.ipynb
  post-render: 
    - mv docs/src/notebooks/eda.html docs/
    - mv docs/src/notebooks/modeling.html docs/
    - rm -rf docs/src/

format:
  html:
    embed-resources: true
    code-fold: false
    html-math-method: katex
    toc: true
    toc-depth: 2
    toc-title: "Contents"
    number-sections: false
    theme: cosmo
    include-after-body:
      - templates/_tracker.html  # Adds goatcounter tracker to the HTML file